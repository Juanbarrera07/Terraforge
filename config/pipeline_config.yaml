# TerraForge Mining Intelligence — Pipeline Configuration
# All thresholds referenced by the application. Edit here; app reloads on restart.

# ── Coregistration ────────────────────────────────────────────────────────────
coreg_rmse_threshold: 0.5          # pixels — hard stop above this

# ── ML Quality Gates (2-tier legacy) ─────────────────────────────────────────
min_oa_threshold: 0.80             # overall accuracy — block export below this
min_minority_f1: 0.70              # minority class F1 — block export below this

# ── 3-tier Quality Gates ──────────────────────────────────────────────────────
# Each metric has a pass threshold (ideal) and a fail threshold (hard stop).
# Values between the two thresholds produce a WARNING (proceed with caution).
quality_gate_oa_pass: 0.90         # OA ≥ 0.90 → PASS;  0.80–0.90 → WARNING
quality_gate_oa_fail: 0.80         # OA < 0.80 → FAIL
quality_gate_kappa_pass: 0.80      # Kappa ≥ 0.80 → PASS; 0.65–0.80 → WARNING
quality_gate_kappa_fail: 0.65      # Kappa < 0.65 → FAIL
quality_gate_f1_pass: 0.70         # Minority F1 ≥ 0.70 → PASS; 0.50–0.70 → WARNING
quality_gate_f1_fail: 0.50         # Minority F1 < 0.50 → FAIL
quality_gate_confidence_pass: 0.75 # Mean confidence ≥ 0.75 → PASS; 0.60–0.75 → WARNING
quality_gate_confidence_fail: 0.60 # Mean confidence < 0.60 → FAIL
quality_gate_nodata_pass: 0.05     # Nodata fraction ≤ 5% → PASS; 5–10% → WARNING
quality_gate_nodata_fail: 0.10     # Nodata fraction > 10% → FAIL

# ── Drift Monitor ────────────────────────────────────────────────────────────
drift_alert_pct: 20                # % class area change vs previous run → anomaly flag

# ── Post-processing ──────────────────────────────────────────────────────────
min_mapping_unit_ha: 0.5           # sieve filter default (ha)
confidence_threshold: 0.6          # pixels below this confidence are replaced by local median
median_filter_size: 3              # kernel size for the median-smooth step
morphological_kernel_size: 3       # structuring element size for morphological closing
morphological_iterations: 1        # number of morphological closing passes
sieve_connectivity: 4              # pixel connectivity for GDAL sieve filter (4 or 8)

# ── Drone imagery overrides ──────────────────────────────────────────────────
drone_pixel_res_threshold_m: 1.0   # below this → drone_mode auto-enabled
drone_median_kernel_max: 7          # cap median kernel in drone mode
drone_morpho_iterations: 2          # more passes, smaller kernel
drone_sieve_min_px: 100             # minimum pixels for MMU in drone mode

# ── ML Training ──────────────────────────────────────────────────────────────
default_k_folds: 5
smote_auto_threshold_pct: 10       # any class < 10% total → auto-suggest SMOTE

# ── Ingestion Validation ─────────────────────────────────────────────────────
max_date_gap_days: 30              # warn if layer acquisition dates differ by > this
min_overlap_pct: 80.0              # error if spatial overlap < this %
max_resolution_ratio: 2.0          # warn if GSD ratio between layers > this
phenology_month_gap: 2             # warn if layers span more than this many calendar months

# ── Feature Engineering ──────────────────────────────────────────────────────
corr_flag_threshold: 0.95          # flag feature pairs with |r| strictly above this (> not >=)
glcm_window_size: 7                # overlap padding for GLCM tile reads = window_size // 2
glcm_levels: 32                    # grey-level quantisation bins for GLCM computation

# ── SAR preprocessing ────────────────────────────────────────────────────────
sar_enl_default: 1.0              # single-look conservative default
sar_enl_sentinel1_iw: 4.9        # Sentinel-1 IW mode typical ENL

# ── File handling ────────────────────────────────────────────────────────────
upload_size_limit_mb: 500
tmp_dir: tmp                       # relative to project root

# ── Band map templates ────────────────────────────────────────────────────────
band_templates:
  sentinel2_l2a_10m:
    blue:     2    # B02 10m
    green:    3    # B03 10m
    red:      4    # B04 10m
    nir:      8    # B08 10m
  sentinel2_l2a_20m:
    blue:     1    # B02 resampled
    green:    2    # B03
    red:      3    # B04
    red_edge: 4    # B05
    nir:      7    # B8A
    swir1:    8    # B11
    swir2:    9    # B12
  sentinel1_grd_dual:
    vv:       1
    vh:       2
  drone_rgb:
    red:      1
    green:    2
    blue:     3
  drone_multispectral_5band:
    blue:     1
    green:    2
    red:      3
    red_edge: 4
    nir:      5

# ── Pit wall class definitions ────────────────────────────────────────────────
pit_wall_classes:
  0: "NoData / Shadow"
  1: "Exposed Fresh Rock"
  2: "Weathered / Oxidised Material"
  3: "Instability Zone (Displacement Risk)"
  4: "Vegetation Encroachment"
  5: "Water / Seepage"

# ── TSF class definitions ─────────────────────────────────────────────────────
tsf_classes:
  0: "NoData"
  1: "Active Wet Tailings"
  2: "Dry Beach (Oxidised)"
  3: "Ponded Water"
  4: "Rehabilitated Surface"
  5: "Dust Risk Zone (Dry Fine Material)"
  6: "Seepage / Discolouration Zone"

# ── Drone-specific processing ─────────────────────────────────────────────────
# (drone_pixel_res_threshold_m is already set above — not duplicated)
drone_block_size: 256              # smaller tiles for high-res imagery
drone_rgb_scale_to_float: true     # auto-scale uint8 bands before index computation

# ── Mining-specific features ──────────────────────────────────────────────────
mining_features_enabled: true      # enable iron_oxide, clay_index, ferrous, mndwi
